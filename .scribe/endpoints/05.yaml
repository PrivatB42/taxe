name: Commandes
description: ''
endpoints:
  -
    httpMethods:
      - POST
    uri: api/commande/create
    metadata:
      groupName: Commandes
      groupDescription: ''
      subgroup: ''
      subgroupDescription: ''
      title: |-
        Créer une commande

        Cette route permet de créer une commande pour un utilisateur existant ou non.
        Si l'utilisateur n'existe pas, un compte lui sera automatiquement créé avec un mot de passe aléatoire et envoyé par email (si l'email est fourni).

        Le panier doit contenir des articles valides. La livraison, le mode de paiement, les réductions, les récompenses et les frais sont gérés automatiquement selon les données fournies.
      description: ''
      authenticated: false
      deprecated: false
      custom: []
    headers:
      Content-Type: application/json
      Accept: application/json
    urlParameters: []
    cleanUrlParameters: []
    queryParameters: []
    cleanQueryParameters: []
    bodyParameters:
      nom_complet:
        name: nom_complet
        description: "Nom complet du client. Requis si l'utilisateur n'est pas connecté. Exemple: Jean Dupont"
        required: true
        example: consequatur
        type: string
        enumValues: []
        exampleWasSpecified: false
        nullable: false
        custom: []
      email:
        name: email
        description: 'Email du client. Facultatif. Exemple: jean@example.com'
        required: false
        example: qkunze@example.com
        type: string
        enumValues: []
        exampleWasSpecified: false
        nullable: true
        custom: []
      telephone:
        name: telephone
        description: "Numéro de téléphone du client (10 chiffres). Requis si l'utilisateur n'est pas connecté. Exemple: 0701020304"
        required: true
        example: consequatur
        type: string
        enumValues: []
        exampleWasSpecified: false
        nullable: false
        custom: []
      adresse_livraison:
        name: adresse_livraison
        description: 'Adresse de livraison. Exemple: Cocody, Angré Terminus 81'
        required: true
        example: consequatur
        type: string
        enumValues: []
        exampleWasSpecified: false
        nullable: false
        custom: []
      commune_id:
        name: commune_id
        description: 'ID de la commune de livraison. Doit exister en base. Exemple: 1'
        required: true
        example: 17
        type: integer
        enumValues: []
        exampleWasSpecified: false
        nullable: false
        custom: []
      pays_id:
        name: pays_id
        description: 'ID du pays. Exemple: 1'
        required: true
        example: 17
        type: integer
        enumValues: []
        exampleWasSpecified: false
        nullable: false
        custom: []
      autres_plateformes:
        name: autres_plateformes
        description: 'Must not be greater than 255 characters.'
        required: false
        example: mqeopfuudtdsufvyvddqa
        type: string
        enumValues: []
        exampleWasSpecified: false
        nullable: true
        custom: []
      mode_paiement:
        name: mode_paiement
        description: 'Mode de paiement : a_la_livraison ou en_ligne. Exemple: a_la_livraison'
        required: true
        example: consequatur
        type: string
        enumValues: []
        exampleWasSpecified: false
        nullable: false
        custom: []
      operateur:
        name: operateur
        description: 'Nom de l’opérateur de paiement. Requis uniquement si mode_paiement = en_ligne. Exemple: Orange Money'
        required: false
        example: consequatur
        type: string
        enumValues: []
        exampleWasSpecified: false
        nullable: false
        custom: []
      commentaire:
        name: commentaire
        description: 'Commentaire facultatif. Exemple: Merci de livrer avant 18h'
        required: false
        example: consequatur
        type: string
        enumValues: []
        exampleWasSpecified: false
        nullable: true
        custom: []
      panier:
        name: panier
        description: 'Liste des articles dans le panier'
        required: true
        example:
          - consequatur
        type: 'string[]'
        enumValues: []
        exampleWasSpecified: false
        nullable: false
        custom: []
      isUrgent:
        name: isUrgent
        description: 'true si livraison urgente. Exemple: true'
        required: false
        example: false
        type: boolean
        enumValues: []
        exampleWasSpecified: false
        nullable: true
        custom: []
      codePromo:
        name: codePromo
        description: 'Code promotionnel facultatif. Exemple: PROMO10'
        required: false
        example: consequatur
        type: string
        enumValues: []
        exampleWasSpecified: false
        nullable: true
        custom: []
      'panier[].id':
        name: 'panier[].id'
        description: 'ID de l’article. Exemple: 12'
        required: true
        example: 17
        type: integer
        enumValues: []
        exampleWasSpecified: false
        nullable: false
        custom: []
      'panier[].quantite':
        name: 'panier[].quantite'
        description: 'Quantité souhaitée. Exemple: 3'
        required: true
        example: 17
        type: integer
        enumValues: []
        exampleWasSpecified: false
        nullable: false
        custom: []
      telephone_livraison:
        name: telephone_livraison
        description: 'Numéro de téléphone pour la livraison. Exemple: 0704050607'
        required: true
        example: consequatur
        type: string
        enumValues: []
        exampleWasSpecified: false
        nullable: false
        custom: []
      withCompte:
        name: withCompte
        description: 'true si le client veut que son compte soit créé. Exemple: true'
        required: false
        example: false
        type: boolean
        enumValues: []
        exampleWasSpecified: false
        nullable: false
        custom: []
    cleanBodyParameters:
      nom_complet: consequatur
      email: qkunze@example.com
      telephone: consequatur
      adresse_livraison: consequatur
      commune_id: 17
      pays_id: 17
      autres_plateformes: mqeopfuudtdsufvyvddqa
      mode_paiement: consequatur
      operateur: consequatur
      commentaire: consequatur
      panier:
        - consequatur
      isUrgent: false
      codePromo: consequatur
      telephone_livraison: consequatur
      withCompte: false
    fileParameters: []
    responses:
      -
        status: 201
        content: |-
          {
            "success": true,
            "message": "Commande crée avec successe",
            "code": 201
          }
        headers: []
        description: ''
        custom: []
      -
        status: 404
        content: |-
          {
            "success": false,
            "message": "commune introuvable",
            "code": 404
          }
        headers: []
        description: ''
        custom: []
      -
        status: 422
        content: |-
          {
            "success": false,
            "message": {
              "telephone_livraison": ["Le numéro de téléphone est obligatoire."],
              "panier": ["Le panier est requis."]
            },
            "code": 422
          }
        headers: []
        description: ''
        custom: []
      -
        status: 500
        content: |-
          {
            "success": false,
            "message": "Erreur lors de la création de la commande ...",
            "code": 500
          }
        headers: []
        description: ''
        custom: []
    responseFields: []
    auth: []
    controller: null
    method: null
    route: null
    custom: []
  -
