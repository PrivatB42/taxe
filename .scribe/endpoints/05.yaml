      title: |-
        Suivre le statut de livraison d'une commande

        Cette route permet d’obtenir le **statut actuel de livraison** d’une commande à partir de son numéro.
        Le statut peut indiquer des étapes telles que : "En préparation", "Expédiée", "Livrée", etc.
      description: ''
      authenticated: false
      deprecated: false
      custom: []
    headers:
      Content-Type: application/json
      Accept: application/json
    urlParameters:
      numero_commande:
        name: numero_commande
        description: 'Le numéro unique de la commande à suivre. Exemple: CMD20250710001'
        required: true
        example: consequatur
        type: string
        enumValues: []
        exampleWasSpecified: false
        nullable: false
        custom: []
    cleanUrlParameters:
