        Appliquer un code promotionnel à un panier

        Cette route permet à un utilisateur authentifié d’appliquer un code promotionnel à un panier d’articles.
        Elle valide les articles du panier, calcule le montant total, puis tente d’appliquer le code promo.
      description: ''
      authenticated: true
      deprecated: false
      custom: []
